<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#f8f3fb">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/jpeg" media="(prefers-color-scheme: light)" href="{{ '/assets/logos/light_mode_icon_noname.jpeg' | relative_url }}">
  <link rel="icon" type="image/jpeg" media="(prefers-color-scheme: dark)" href="{{ '/assets/logos/dark_mode_icon_noname.jpeg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/logos/light_mode_icon_noname.jpeg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <header class="site-header">
    <div class="shell nav-wrap">
      <a class="brand" href="{{ '/' | relative_url }}">
        <picture class="brand-picture">
          <source media="(prefers-color-scheme: dark)" srcset="{{ '/assets/logos/dark_mode_icon_noname.jpeg' | relative_url }}">
          <img
            class="brand-icon"
            src="{{ '/assets/logos/light_mode_icon_noname.jpeg' | relative_url }}"
            alt="Happie Couple logo"
          >
        </picture>
        <span>Happie Couple</span>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/PRIVACY_POLICY' | relative_url }}">Privacy</a>
        <a href="{{ '/TERMS_OF_SERVICE' | relative_url }}">Terms</a>
        <a href="mailto:support@happiecouple.app">Support</a>
      </nav>
    </div>
  </header>

  <main class="shell content-shell">
    {% if page.home %}
      {{ content }}
    {% else %}
      <article class="panel prose">
        {{ content }}
      </article>
    {% endif %}
  </main>

  <footer class="site-footer">
    <div class="shell footer-wrap">
      <p class="footer-copy">
        <picture class="footer-picture">
          <source media="(prefers-color-scheme: dark)" srcset="{{ '/assets/logos/dark_mode_icon_noname.jpeg' | relative_url }}">
          <img
            class="footer-logo"
            src="{{ '/assets/logos/light_mode_icon_noname.jpeg' | relative_url }}"
            alt="Happie Couple logo"
          >
        </picture>
        <span>© {{ "now" | date: "%Y" }} Happie Couple. Built for healthier conversations.</span>
      </p>
      <div class="footer-links">
        <a href="{{ '/PRIVACY_POLICY' | relative_url }}">Privacy Policy</a>
        <a href="{{ '/TERMS_OF_SERVICE' | relative_url }}">Terms of Service</a>
      </div>
    </div>
  </footer>
</body>
</html>
